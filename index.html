<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>System Failure</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:red;
flex-direction:column;
}

h1{
font-size:50px;
animation:blink 0.2s infinite;
text-align:center;
}

p{
color:white;
font-size:22px;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}
</style>
</head>

<body onclick="start()">

<h1>⚠ SYSTEM FAILURE ⚠</h1>
<p>Tap anywhere to continue</p>

<audio id="sound" src="sound.mp3"></audio>

<script>
function start(){

document.documentElement.requestFullscreen?.();

document.getElementById("sound").play();

navigator.vibrate?.([500,200,500,200,1000]);

document.body.innerHTML = `
<h1 style="font-size:70px;">DEVICE LOCKED</h1>
<p>Critical system error...</p>
`;

setInterval(()=>{
navigator.vibrate?.(300);
},1000);

setTimeout(()=>{
alert("Photos deleted");
},2000);

setTimeout(()=>{
alert("Bank data leaked");
},5000);

setTimeout(()=>{
document.body.innerHTML = `
<h1 style="color:white;">😂 PRANK 😂</h1>
<p style="color:white;">You can close the tab now</p>
`;
},9000);

}
</script>

</body>
</html>
